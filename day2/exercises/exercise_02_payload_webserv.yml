#
#     This exercise practices:
#     - mktemp for temporary file creation
#     - msf-payload for ELF binary generation
#     - webserv with background mode
#     - exploit/multi/handler as a background listener
#     - Timing with sleep between background steps
#     - msf-session with Meterpreter stdapi commands
#
# Requirements:
#     - Metasploitable2 VM running and reachable
#     - curl installed on the attacker machine
#     - msfrpcd running: msfrpcd -P msf -a 127.0.0.1
#     - Run with: attackmate --config ../config.yml exercise_02_payload_webserv.yml
#
# Instructions:
#     1. Replace CHANGE_ME and CHANGE_ME_ATTACKER with your actual IPs
#     2. Fill in all TODO sections
#     3. Run the playbook and verify you get a Meterpreter session
#
# Hint: Check handout 03_payload_delivery.md and walkthrough 02 if stuck.
#

