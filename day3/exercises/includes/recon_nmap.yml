# Phase 1: Reconnaissance - nmap scan + service detection
#
# What this does:
#   1. Verifies the target is reachable with ping
#   2. Runs nmap against Metasploitable2 ports and stores the output in $NMAP_OUTPUT
#   3. Uses regex to extract the list of open port numbers into $OPEN_PORTS
#
# Variables required: $TARGET
# Variables set:      $NMAP_OUTPUT, $OPEN_PORTS
# ATT&CK: T1046 (Network Service Discovery), T1595.002 (Vulnerability Scanning)

commands:
  # Step 1: Verify the target is reachable before spending time on a scan.
  # TODO Send 1 ping packet with a 2-second timeout.
  # TODO: Fill in the error_if condition.
  # What does a failed ping return as $RESULT_RETURNCODE?
  - type: shell
    cmd: # TODO
    exit_on_error: true
    error_if: # TODO: $RESULT_RETURNCODE != ?
    metadata:
      tactic: "TA0043"
      technique: "T1595.002"
      technique_name: "Active Scanning"

  - type: debug
    cmd: "Target $TARGET is reachable. Starting port scan..."

  # Step 2: Run nmap against the target.
  # The port list below covers the services open on Metasploitable2.
  # TODO: Choose the right nmap flags.
  # You want service version detection so you can identify what is running.
  # Add any other flags you think are useful.
  - type: shell
    cmd: # TODO: nmap
         # you can copy this port list (pre-filled): -p 21,22,23,25,80,111,139,445,512,513,514,1099,1524,2049,2121,3306,3632,5432,5900,6000,6667,8009,8180 $TARGET
    metadata:
      tactic: "TA0043"
      technique: "T1046"
      technique_name: "Network Service Discovery"

  # Store the full scan output for reference in later steps
  - type: setvar
    variable: NMAP_OUTPUT
    cmd: $RESULT_STDOUT

  - type: debug
    cmd: "Scan complete. Raw output stored in $NMAP_OUTPUT"

  # Step 3: Extract just the open port numbers from the nmap output.
  # The regex command runs against $RESULT_STDOUT of the previous command,
  # or you can pipe $NMAP_OUTPUT through a shell command.
  #
  # TODO: Write a regex command that extracts open port numbers.
  # nmap output lines for open ports look like:
  #   21/tcp   open  ftp     vsftpd 2.3.4
  #   22/tcp   open  ssh     OpenSSH 4.7p1
  # You want to capture the number before "/tcp" on lines containing "open".
  # Use mode: findall to get all matches as a list.
  # Store the result in $OPEN_PORTS using the output mapping.
  - type: regex
    cmd: # TODO: regex pattern to match port numbers on open lines
    mode: # TODO
    output:
      OPEN_PORTS: # TODO
    exit_on_error: false

  - type: debug
    cmd: "Open ports found: $OPEN_PORTS"
