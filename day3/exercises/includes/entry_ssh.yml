# Phase 4: Initial Access - SSH with Weak Credentials
#
# Background: Metasploitable2 ships with the account user/user enabled.
# This is a valid accounts abuse rather than an exploit - no CVE, no module.
#
# Result:     Interactive SSH session as low-privilege user (privilege escalation required)
# Variables required: $TARGET
# Variables set:      $SESSION_NAME
# ATT&CK: T1078.003 (Valid Accounts: Local Accounts)

commands:
  - type: debug
    cmd: "Opening SSH session to $TARGET with known credentials..."

  # TODO: Open an SSH session using the weak credentials.
  # Fill in username and password. Use ssh_foothold as the session name so we can save it in a variable in the next command and reference it in later phases.
  # You can run 'id' as the first command to immediately see which user you landed as.
  - type: ssh
  # TODO


  # Store the session name for subsequent includes
  - type: setvar
    variable: SESSION_NAME
    cmd: ssh_foothold

  - type: debug
    cmd: "SSH foothold established as: $RESULT_STDOUT. Privilege escalation required."
