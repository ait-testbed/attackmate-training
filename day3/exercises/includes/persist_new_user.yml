# Phase 5: Persistence - Create Backdoor User
#
# Creates a new local account with a known password and sudo rights.
# After this, the attacker can SSH in as the backdoor user at any time
# regardless of what happens to the original compromise vector.
#
# Variables required: $SESSION_NAME, $TARGET
# ATT&CK: T1136.001 (Create Account: Local Account)
#
# NOTE: Requires root. New accounts appear in /etc/passwd and will be
# visible during any user audit.
#
# CLEANUP: Run 'userdel -r backdooruser' at the end of the exercise.

