# Phase 1 SOLUTION: Reconnaissance - nmap scan + service detection
#
# What this does:
#   1. Verifies the target is reachable with ping
#   2. Runs nmap against Metasploitable2 ports and stores the output in $NMAP_OUTPUT
#   3. Uses regex to extract the list of open port numbers into $OPEN_PORTS
#
# Variables required: $TARGET
# Variables set:      $NMAP_OUTPUT, $OPEN_PORTS
# ATT&CK: T1046 (Network Service Discovery), T1595.002 (Vulnerability Scanning)

commands:
  # Step 1: Verify the target is reachable before spending time on a scan.
  # -c 1 sends a single packet; -W 2 sets a 2-second deadline.
  # ping returns exit code 1 when the host is unreachable, so error_if triggers
  # on any non-zero return code.
  - type: shell
    cmd: ping -c 1 -W 2 $TARGET
    exit_on_error: true
    error_if: "$RESULT_RETURNCODE != 0"
    metadata:
      tactic: "TA0043"
      technique: "T1595.002"
      technique_name: "Active Scanning"

  - type: debug
    cmd: "Target $TARGET is reachable. Starting port scan..."

  # Step 2: Run nmap with service version detection (-sV) against the target.
  # -sV probes open ports to determine what service and version is running.
  # The port list covers all services present on Metasploitable2.
  - type: shell
    cmd: nmap -sV -p 21,22,23,25,80,111,139,445,512,513,514,1099,1524,2049,2121,3306,3632,5432,5900,6000,6667,8009,8180 $TARGET
    metadata:
      tactic: "TA0043"
      technique: "T1046"
      technique_name: "Network Service Discovery"

  # Store the full scan output for reference in later steps.
  - type: setvar
    variable: NMAP_OUTPUT
    cmd: $RESULT_STDOUT

  - type: debug
    cmd: "Scan complete. Raw output stored in $NMAP_OUTPUT"

  # Step 3: Extract just the open port numbers from the nmap output.
  # nmap lines for open ports look like:
  #   21/tcp   open  ftp     vsftpd 2.3.4
  #   22/tcp   open  ssh     OpenSSH 4.7p1
  # The group (\d+) captures the port number; /tcp\s+open filters to open lines only.
  # mode: findall collects every match; REGEX_MATCHES_LIST holds all of them as a list.
  # input: NMAP_OUTPUT reads from the stored variable rather than $RESULT_STDOUT,
  # which was overwritten by the setvar command above.
  - type: regex
    cmd: '(\d+)/tcp\s+open'
    mode: findall
    input: NMAP_OUTPUT
    output:
      OPEN_PORTS: $REGEX_MATCHES_LIST
    exit_on_error: false

  - type: debug
    cmd: "Open ports found: $OPEN_PORTS"
