# Full Attack Chain - Day 3 Capstone Exercise
#
# Instructions:
#   1. Set TARGET and ATTACKER_IP in the vars section below.
#   2. Choose includes per phase by uncommenting it and commenting out the others.
#   3. Open each chosen include file and fill in the TODOs.
#   4. Run: attackmate attack_chain.yml
#
# Tip: use 'attackmate --debug attack_chain.yml' to print variable values at each step.
# See 01_debugging_cheatsheet.md if a step fails.

vars:
  TARGET: 192.168.56.101          # Metasploitable2 IP address
  ATTACKER_IP: 192.168.56.1     # Your attacker machine IP (used as LHOST for callbacks)
  LPORT: "4444"              # Listener port for reverse shells

# BEFORE YOU RUN: make sure callback ports are reachable
# ─────────────────────────────────────────────────────
# Reverse shells and Meterpreter sessions require the TARGET to connect BACK to
# ATTACKER_IP on LPORT 4444 (and port 4445 if you use the Meterpreter upgrade).
# If your attacker machine has a firewall, these inbound connections will be
# silently dropped and the session will never appear.
#
# Check and open the ports if needed before running the playbook.
# -s TARGET_IP to restricts the rule to connections from the target only:
#
#   sudo iptables -L INPUT -n -v --line-numbers   # inspect current rules
#   sudo iptables -A INPUT -s TARGET_IP -p tcp --dport 4444 -j ACCEPT
#   sudo iptables -A INPUT -s TARGET_IP -p tcp --dport 4445 -j ACCEPT
#
# If you want to verify a port is actually reachable from the target side:
#   nc -lvnp 4444   # on attacker - listen
#   nc ATTACKER_IP 4444   # on target - connect
# Close the connection again before running the playbook, or the port will appear "in use".
#
# See 01_debugging_cheatsheet.md, section "Firewall Rules" and
# "Diagnosing Reverse Shell Callbacks" for full troubleshooting steps.

